<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | Work Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .work-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .work-top-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .work-date-input {
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 1rem; 
            color: var(--text-main); 
            font-family: inherit; 
            font-size: 1rem; 
            outline: none; 
            flex: 1;
            transition: all 0.3s ease;
            min-width: 140px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .work-text-input {
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 1rem; 
            color: var(--text-main); 
            font-family: inherit; 
            font-size: 1rem; 
            outline: none; 
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 80px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .work-text-input:focus, .work-date-input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 42, 95, 0.2);
        }

        #addRecordBtn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        #addRecordBtn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .date-badge {
            background: rgba(99, 102, 241, 0.1); 
            color: var(--primary-dark); 
            padding: 0.4rem 0.8rem; 
            border-radius: 6px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            margin-right: 0.5rem;
            white-space: nowrap;
            align-self: flex-start;
        }
        
        .work-text-display {
            white-space: pre-wrap;
            line-height: 1.4;
        }
        
        .task-item.work-item {
            align-items: flex-start;
        }

        @media (max-width: 480px) {
            .work-top-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <div class="top-nav simple-nav">
                <a href="index.html" class="nav-btn transition-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>Back</span>
                </a>
            </div>
            <div class="logo-area" style="justify-content: center;">
                <span style="font-size: 1.5rem; margin-right: 0.5rem; color: var(--primary-dark); margin-top: 0.3rem;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                </span>
                <h1>Work Records</h1>
            </div>
            <p class="subtitle">Review everything you've accomplished</p>
        </header>

        <section class="input-section">
            <div class="work-input-wrapper">
                <div class="work-top-row">
                    <input type="date" id="workDate" class="work-date-input" title="Date of work">
                    <button id="addRecordBtn" aria-label="Save Work Record">
                        Save Work
                    </button>
                </div>
                <textarea id="workText" class="work-text-input" placeholder="What did you get done today?"></textarea>
            </div>
        </section>

        <section class="task-section">
            <ul id="workList" class="task-list">
                <!-- Work records will be injected here -->
            </ul>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const workDate = document.getElementById('workDate');
            const workText = document.getElementById('workText');
            const addRecordBtn = document.getElementById('addRecordBtn');
            const workList = document.getElementById('workList');

            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            workDate.value = today;

            let workRecords = JSON.parse(localStorage.getItem('workRecords')) || [];

            renderRecords();

            addRecordBtn.addEventListener('click', addRecord);

            function addRecord() {
                const date = workDate.value;
                const text = workText.value.trim();

                if (date && text) {
                    const newRec = {
                        id: Date.now(),
                        date: date,
                        text: text
                    };
                    workRecords.push(newRec);
                    
                    // Sort records by date (newest first)
                    workRecords.sort((a, b) => b.date.localeCompare(a.date));
                    
                    workText.value = '';
                    saveAndRender();
                } else {
                    alert('Please enter both date and your work notes.');
                }
            }

            function deleteRecord(id) {
                const element = document.querySelector(`[data-id="${id}"]`);
                element.style.transform = 'scale(0.95) translateX(-20px)';
                element.style.opacity = '0';
                
                setTimeout(() => {
                    workRecords = workRecords.filter(rec => rec.id !== id);
                    saveAndRender();
                }, 300);
            }

            function saveAndRender() {
                localStorage.setItem('workRecords', JSON.stringify(workRecords));
                renderRecords();
            }

            function formatDate(dateString) {
                const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
                return new Date(dateString).toLocaleDateString(undefined, options);
            }

            function renderRecords() {
                workList.innerHTML = '';

                if (workRecords.length === 0) {
                    workList.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top:2rem;">No work records yet.</p>';
                    return;
                }

                workRecords.forEach(rec => {
                    const li = document.createElement('li');
                    li.className = 'task-item work-item';
                    li.dataset.id = rec.id;
                    
                    li.innerHTML = `
                        <div class="date-badge">${formatDate(rec.date)}</div>
                        <span class="task-text work-text-display">${rec.text}</span>
                        <button class="delete-btn" aria-label="Delete record" style="margin-left: auto;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    `;

                    const delBtn = li.querySelector('.delete-btn');
                    delBtn.addEventListener('click', () => deleteRecord(rec.id));

                    workList.appendChild(li);
                });
            }
        });
    </script>
    <script src="transition.js"></script>
</body>
</html>
