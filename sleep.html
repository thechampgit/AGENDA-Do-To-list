<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | Sleep Cycle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .sleep-input-wrapper {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap; 
        }

        .sleep-date-input, .sleep-time-input {
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 1rem; 
            color: var(--text-main); 
            font-family: inherit; 
            font-size: 1rem; 
            outline: none; 
            flex: 1;
            transition: all 0.3s ease;
            min-width: 140px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .sleep-date-input:focus, .sleep-time-input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 42, 95, 0.2);
        }

        #addSleepBtn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        #addSleepBtn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .record-badge {
            background: rgba(99, 102, 241, 0.1); 
            color: var(--primary-dark); 
            padding: 0.4rem 0.8rem; 
            border-radius: 6px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            margin-right: 0.5rem;
            white-space: nowrap;
        }
        
        .duration-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 0.4rem 0.8rem; 
            border-radius: 6px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            margin-left: auto;
            margin-right: 0.5rem;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .sleep-date-input, .sleep-time-input {
                flex: 1 1 100%;
            }
            #addSleepBtn {
                width: 100%;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <div class="top-nav simple-nav">
                <a href="index.html" class="nav-btn transition-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>Back</span>
                </a>
            </div>
            <div class="logo-area" style="justify-content: center;">
                <span style="font-size: 1.5rem; margin-right: 0.5rem; color: var(--primary-dark); margin-top: 0.3rem;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"></path></svg>
                </span>
                <h1>Sleep Cycle</h1>
            </div>
            <p class="subtitle">Track your rest and recovery</p>
        </header>

        <section class="input-section">
            <div class="sleep-input-wrapper">
                <input type="date" id="sleepDate" class="sleep-date-input" title="Date of sleep">
                <input type="time" id="bedTime" class="sleep-time-input" title="Bed Time">
                <input type="time" id="wakeTime" class="sleep-time-input" title="Wake up Time">
                <button id="addSleepBtn" aria-label="Add Sleep Record">
                    Save
                </button>
            </div>
        </section>

        <section class="task-section">
            <ul id="sleepList" class="task-list">
                <!-- Sleep records will be injected here -->
            </ul>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sleepDate = document.getElementById('sleepDate');
            const bedTime = document.getElementById('bedTime');
            const wakeTime = document.getElementById('wakeTime');
            const addSleepBtn = document.getElementById('addSleepBtn');
            const sleepList = document.getElementById('sleepList');

            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            sleepDate.value = today;

            let sleepRecords = JSON.parse(localStorage.getItem('sleepRecords')) || [];

            renderSleepRecords();

            addSleepBtn.addEventListener('click', addRecord);

            function calculateDuration(start, end) {
                let [startHr, startMin] = start.split(':').map(Number);
                let [endHr, endMin] = end.split(':').map(Number);

                let startMins = startHr * 60 + startMin;
                let endMins = endHr * 60 + endMin;

                if (endMins < startMins) {
                    endMins += 24 * 60; // Next day
                }

                let diff = endMins - startMins;
                let hrs = Math.floor(diff / 60);
                let mins = diff % 60;

                return `${hrs}h ${mins}m`;
            }

            function addRecord() {
                const date = sleepDate.value;
                const start = bedTime.value;
                const end = wakeTime.value;

                if (date && start && end) {
                    const newRec = {
                        id: Date.now(),
                        date: date,
                        start: start,
                        end: end,
                        duration: calculateDuration(start, end)
                    };
                    sleepRecords.push(newRec);
                    
                    // Sort records by date (newest first)
                    sleepRecords.sort((a, b) => b.date.localeCompare(a.date));
                    
                    bedTime.value = '';
                    wakeTime.value = '';
                    saveAndRender();
                } else {
                    alert('Please enter date, bed time, and wake time.');
                }
            }

            function deleteRecord(id) {
                const element = document.querySelector(`[data-id="${id}"]`);
                element.style.transform = 'scale(0.95) translateX(-20px)';
                element.style.opacity = '0';
                
                setTimeout(() => {
                    sleepRecords = sleepRecords.filter(rec => rec.id !== id);
                    saveAndRender();
                }, 300);
            }

            function saveAndRender() {
                localStorage.setItem('sleepRecords', JSON.stringify(sleepRecords));
                renderSleepRecords();
            }

            function formatTime(timeString) {
                const [hr, min] = timeString.split(':');
                let h = parseInt(hr);
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                return `${h}:${min} ${ampm}`;
            }
            
            function formatDate(dateString) {
                const options = { month: 'short', day: 'numeric' };
                return new Date(dateString).toLocaleDateString(undefined, options);
            }

            function renderSleepRecords() {
                sleepList.innerHTML = '';

                if (sleepRecords.length === 0) {
                    sleepList.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top:2rem;">No sleep records yet.</p>';
                    return;
                }

                sleepRecords.forEach(rec => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    li.dataset.id = rec.id;
                    
                    li.innerHTML = `
                        <div class="record-badge">${formatDate(rec.date)}</div>
                        <span class="task-text" style="font-weight: 500;">
                            ${formatTime(rec.start)} - ${formatTime(rec.end)}
                        </span>
                        <div class="duration-badge">${rec.duration}</div>
                        <button class="delete-btn" aria-label="Delete record">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    `;

                    const delBtn = li.querySelector('.delete-btn');
                    delBtn.addEventListener('click', () => deleteRecord(rec.id));

                    sleepList.appendChild(li);
                });
            }
        });
    </script>
    <script src="transition.js"></script>
</body>
</html>
