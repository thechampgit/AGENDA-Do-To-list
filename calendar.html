<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | Calendar</title>
    <meta name="description" content="Mark dates on which you are busy or free">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .month-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .month-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--primary-dark);
            padding: 0.5rem;
            border-radius: 8px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .month-btn:hover { background: rgba(208, 39, 82, 0.1); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        
        .day-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border: 2px solid transparent;
            background: rgba(255, 42, 95, 0.05); /* Match vibrant pink */
            color: var(--text-main);
        }

        .day-cell:hover:not(.empty) {
            border-color: var(--primary-light);
            background: rgba(255, 42, 95, 0.12);
            transform: scale(1.08);
        }

        .day-cell.busy {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
            font-weight: 700;
            box-shadow: 0 4px 10px -2px rgba(208, 39, 82, 0.4);
            transform: scale(1.05); 
        }
        
        .day-cell.busy:hover { transform: scale(1.1); }

        .day-cell.free {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
            font-weight: 700;
            box-shadow: 0 4px 10px -2px rgba(16, 185, 129, 0.4);
            transform: scale(1.05); 
        }
        
        .day-cell.free:hover { transform: scale(1.1); }

        .day-cell.empty {
            cursor: default;
            background: transparent;
        }
        
        .legend {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .busy-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-red);
            box-shadow: 0 2px 4px rgba(208, 39, 82, 0.3);
        }

        .free-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <div class="top-nav simple-nav">
                <a href="index.html" class="nav-btn transition-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>Back</span>
                </a>
            </div>
            <div class="logo-area" style="justify-content: center; display: flex; align-items: center; margin-bottom: 0.5rem;">
                <h1>Availability</h1>
            </div>
            <p class="subtitle">Tap to toggle: Busy (Red) or Free (Green)</p>
        </header>

        <div class="calendar-header">
            <button class="month-btn" id="prevMonth" aria-label="Previous Month">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <h2 id="monthDisplay" style="font-size: 1.3rem; margin: 0; color: var(--primary-dark);">January 2026</h2>
            <button class="month-btn" id="nextMonth" aria-label="Next Month">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <!-- JavaScript will populate the days -->
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="busy-dot"></div>
                <span>Busy</span>
            </div>
            <div class="legend-item">
                <div class="free-dot"></div>
                <span>Free</span>
            </div>
        </div>
    </main>

    <script>
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        let currentDate = new Date();
        // dateStates will store 'busy' or 'free' mapping dates
        let dateStates = JSON.parse(localStorage.getItem('dateStates')) || {};

        const calendarGrid = document.getElementById('calendarGrid');
        const monthDisplay = document.getElementById('monthDisplay');

        function toggleDateState(dateString) {
            const currentState = dateStates[dateString];
            if (!currentState) {
                dateStates[dateString] = 'busy'; // First tap: busy
            } else if (currentState === 'busy') {
                dateStates[dateString] = 'free'; // Second tap: free
            } else {
                delete dateStates[dateString];   // Third tap: clear (neutral)
            }
            localStorage.setItem('dateStates', JSON.stringify(dateStates));
            renderCalendar();
        }

        function renderCalendar() {
            calendarGrid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthDisplay.textContent = `${monthNames[month]} ${year}`;
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = new Date(year, month, 1).getDay();

            // Add Day names
            const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            dayNames.forEach(day => {
                const dayEl = document.createElement('div');
                dayEl.className = 'day-name';
                dayEl.textContent = day;
                calendarGrid.appendChild(dayEl);
            });

            // Add empty cells before first day of month
            for (let i = 0; i < firstDayIndex; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell empty';
                calendarGrid.appendChild(empty);
            }

            // Fill actual days
            for (let i = 1; i <= daysInMonth; i++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                dayCell.textContent = i;
                
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const state = dateStates[dateString];
                
                if (state === 'busy') {
                    dayCell.classList.add('busy');
                } else if (state === 'free') {
                    dayCell.classList.add('free');
                }

                dayCell.addEventListener('click', () => toggleDateState(dateString));
                calendarGrid.appendChild(dayCell);
            }
        }

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Initial setup
        renderCalendar();
    </script>
    <script src="transition.js"></script>
</body>
</html>
